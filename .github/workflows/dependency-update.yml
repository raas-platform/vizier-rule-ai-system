name: 📦 의존성 업데이트

on:
  schedule:
    - cron: '0 2 * * 1'  # 매주 월요일 오전 2시
  workflow_dispatch:

jobs:
  update-dependencies:
    name: 🔄 의존성 업데이트
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: 📦 pip-tools 설치
      run: |
        pip install pip-tools
        
    - name: 🔄 의존성 업데이트
      run: |
        pip-compile --upgrade requirements.in
        pip-compile --upgrade requirements-dev.in
        
    - name: 🧪 업데이트된 의존성 테스트
      run: |
        pip install -r requirements.txt
        python -m pytest backend/tests/ -v
        
    - name: 📝 PR 생성
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: '📦 의존성 자동 업데이트'
        title: '📦 의존성 자동 업데이트'
        body: |
          🤖 자동으로 생성된 의존성 업데이트 PR입니다.
          
          ## 변경사항
          - Python 패키지 의존성 업데이트
          - 보안 패치 및 버그 수정 포함
          
          ## 확인사항
          - [ ] 모든 테스트 통과
          - [ ] 보안 취약점 해결
          - [ ] 호환성 검증 완료
        branch: automated/dependency-update
        delete-branch: true 