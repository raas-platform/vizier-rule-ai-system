name: 🚀 CD - 자동 배포

on:
  push:
    branches: [ main, develop, feature/* ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vizier-rule-ai-system

jobs:
  # ===== Docker 이미지 빌드 =====
  build:
    name: 🐳 Docker 이미지 빌드
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔑 Container Registry 로그인
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏷️ 메타데이터 추출
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # Git Tag가 있으면 그대로 사용 (예: v2.1.11)
          type=ref,event=tag
          # 브랜치 푸시면 브랜치 이름 사용 (예: develop)
          type=ref,event=branch
          # Main 브랜치면 latest 태그 추가
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🔧 Docker Buildx 설정
      uses: docker/setup-buildx-action@v3
      
    - name: 🐳 이미지 빌드 및 푸시
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # 캐시 비활성화
        # cache-from: type=gha
        # cache-to: type=gha,mode=max
        no-cache: true
        
    - name: 📝 이미지 정보 출력
      id: image
      run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_OUTPUT
        
  # ===== 개발 환경 배포 =====
  deploy-development:
    name: 💻 개발 환경 배포
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || contains(github.ref, 'feature/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    environment:
      name: development
      url: http://localhost:8888
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 개발 환경 설정
      run: |
        cp env.template .env
        # 개발 환경용 설정 오버라이드
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=development/' .env
        sed -i 's/DEBUG=false/DEBUG=true/' .env
        sed -i 's/PORT=8000/PORT=8888/' .env
        sed -i 's/WORKERS=4/WORKERS=1/' .env
        sed -i 's/LOG_LEVEL=info/LOG_LEVEL=debug/' .env
        
    - name: 🚀 개발 서버 배포
      run: |
        echo "💻 개발 환경 배포 (로컬 Docker)"
        
        # 기존 컨테이너 정리
        docker stop vizierai-dev || true
        docker rm vizierai-dev || true
        
        # 환경변수 설정 (조건부)
        ENV_ARGS=""
        if [ -n "${{ secrets.OPENAI_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY_DEV }}"
        fi
        if [ -n "${{ secrets.ANTHROPIC_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY_DEV }}"
        fi
        if [ -n "${{ secrets.GOOGLE_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_DEV }}"
        fi
        
        # 새 컨테이너 실행
        docker run -d --name vizierai-dev \
          -p 8888:8000 \
          --env-file .env \
          $ENV_ARGS \
          ${{ needs.build.outputs.image }}
          
        echo "✅ 개발 환경 배포 완료!"
        
    - name: 🏥 개발 환경 헬스체크
      run: |
        sleep 15
        curl -f http://localhost:8888/health || echo "⚠️ 헬스체크 실패"
        
  # ===== 스테이징 배포 =====
  deploy-staging:
    name: 🧪 스테이징 배포
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: http://vizierai.duckdns.org:8001
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 스테이징 환경 설정
      run: |
        cp env.template .env.staging.tmp
        # 스테이징 환경용 설정 오버라이드
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=staging/' .env.staging.tmp
        sed -i 's/DEBUG=false/DEBUG=true/' .env.staging.tmp
        sed -i 's/PORT=8000/PORT=8001/' .env.staging.tmp
        sed -i 's/WORKERS=4/WORKERS=2/' .env.staging.tmp
        sed -i 's/LOG_LEVEL=info/LOG_LEVEL=debug/' .env.staging.tmp
        # GitHub Secrets에서 환경 변수 추가
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY_STAGING }}" >> .env.staging.tmp
        echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY_STAGING }}" >> .env.staging.tmp
        echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_STAGING }}" >> .env.staging.tmp
        echo "SECRET_KEY=${{ secrets.SECRET_KEY_STAGING }}" >> .env.staging.tmp
        
    - name: 🔑 SSH 키 설정
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.STAGING_SSH_KEY || 'dummy-key' }}
        known_hosts: unnecessary
        
    - name: 📁 환경 파일 전송
      run: |
        scp -o StrictHostKeyChecking=no .env.staging.tmp ubuntu@vizierai.duckdns.org:/tmp/.env.staging
        
    - name: 🚀 스테이징 서버 배포
      run: |
        ssh -o StrictHostKeyChecking=no ubuntu@vizierai.duckdns.org << 'EOF'
          echo "🧪 스테이징 배포 시작..."
          
          # Container Registry 로그인
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 기존 컨테이너 정리
          sudo docker stop vizierai-staging || true
          sudo docker rm vizierai-staging || true
          
          # 최신 이미지 풀 및 실행
          sudo docker pull ${{ needs.build.outputs.image }}
          sudo docker run -d --name vizierai-staging \
            -p 8001:8000 \
            --env-file /tmp/.env.staging \
            --restart unless-stopped \
            ${{ needs.build.outputs.image }}
          
          # 환경 파일 정리
          rm -f /tmp/.env.staging
          
          echo "✅ 스테이징 배포 완료!"
        EOF
          
    - name: 🏥 스테이징 헬스체크
      run: |
        sleep 30
        for i in {1..10}; do
          if curl -f http://vizierai.duckdns.org:8001/health; then
            echo "✅ 스테이징 헬스체크 성공!"
            break
          else
            echo "🔄 헬스체크 재시도 ($i/10)..."
            sleep 10
          fi
        done
        
  # ===== 프로덕션 배포 =====
  deploy-production:
    name: 🏭 프로덕션 배포
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: http://vizierai.duckdns.org:8000
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 프로덕션 환경 설정
      run: |
        cp env.template .env.production.tmp
        # 프로덕션 설정은 기본값 유지 (이미 production 설정)
        # GitHub Secrets에서 환경 변수 추가
        echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY_PROD }}" >> .env.production.tmp
        echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY_PROD }}" >> .env.production.tmp
        echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_PROD }}" >> .env.production.tmp
        echo "SECRET_KEY=${{ secrets.SECRET_KEY_PROD }}" >> .env.production.tmp
        
    - name: 🛡️ 프로덕션 사전 검사
      run: |
        echo "🔍 프로덕션 배포 사전 검사..."
        # 태그 버전 확인
        if [[ "${{ github.ref }}" =~ refs/tags/v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "✅ 유효한 버전 태그: ${{ github.ref }}"
        else
          echo "❌ 유효하지 않은 버전 태그"
          exit 1
        fi
        
    - name: 🔑 SSH 키 설정 (프로덕션)
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        known_hosts: unnecessary
        
    - name: 📁 환경 파일 전송
      run: |
        scp -o StrictHostKeyChecking=no .env.production.tmp ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/.env.production
        
    - name: 🚀 프로덕션 서버 배포 (Blue-Green)
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
          echo "🏭 프로덕션 배포 시작..."
          
          # Container Registry 로그인
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # 백업을 위한 현재 컨테이너 이름 변경
          if sudo docker ps -q -f name=vizierai-production; then
            echo "📦 기존 컨테이너 백업..."
            sudo docker stop vizierai-production || true
            sudo docker rename vizierai-production vizierai-production-backup || true
          fi
          
          # 최신 이미지 풀 및 새 컨테이너 실행
          sudo docker pull ${{ needs.build.outputs.image }}
          sudo docker run -d --name vizierai-production \
            -p 8000:8000 \
            --env-file /tmp/.env.production \
            --restart unless-stopped \
            ${{ needs.build.outputs.image }}
          
          # [디버깅] 새 컨테이너 로그를 확인하기 위해 잠시 대기
          sleep 10
          echo "==== [Debug] New container logs ===="
          sudo docker logs --tail 100 vizierai-production
          echo "===================================="

          # 헬스체크
          sleep 15
          if curl -f http://localhost:8000/health; then
            echo "✅ New container health check PASSED!"
            # 백업 컨테이너 정리
            sudo docker stop vizierai-production-backup || true
            sudo docker rm vizierai-production-backup || true
          else
            echo "❌ New container health check FAILED! Rolling back..."
            # [디버깅] 롤백 전, 실패한 컨테이너의 로그를 다시 확인
            echo "==== [Debug] Failed container logs before rollback ===="
            sudo docker logs --tail 200 vizierai-production
            echo "========================================================"
            
            sudo docker stop vizierai-production || true
            sudo docker rm vizierai-production || true
            sudo docker rename vizierai-production-backup vizierai-production || true
            sudo docker start vizierai-production || true
            exit 1
          fi
          
          # 환경 파일 정리
          rm -f /tmp/.env.production
          
          echo "✅ 프로덕션 배포 완료!"
        EOF
          
    - name: 🔍 프로덕션 검증 테스트
      run: |
        sleep 60
        echo "🔍 프로덕션 서비스 검증 중..."
        
        # 헬스체크
        curl -f http://\${{ secrets.PROD_HOST }}:8000/health
        
        # API 문서 확인
        curl -f http://\${{ secrets.PROD_HOST }}:8000/docs
        
        echo "✅ 프로덕션 검증 완료!"
        
    - name: 📈 배포 메트릭 수집
      run: |
        echo "📊 배포 메트릭 기록..."
        echo "배포 완료: $(date)" 
        echo "버전: ${{ github.ref }}"
        echo "커밋: ${{ github.sha }}"
        echo "이미지: ${{ needs.build.outputs.image }}"
          
  # ===== 배포 후 검증 =====
  post-deploy-tests:
    name: 🧪 배포 후 검증
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: 🧪 배포된 서비스 통합 테스트
      env:
        STAGING_URL: http://vizierai.duckdns.org:8001
        PRODUCTION_URL: http://vizierai.duckdns.org:8000
      run: |
        # 스테이징 테스트
        if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
          echo "🧪 스테이징 통합 테스트..."
          
          # 헬스체크
          if curl -f --max-time 30 $STAGING_URL/health; then
            echo "✅ 스테이징 헬스체크 성공"
          else
            echo "❌ 스테이징 헬스체크 실패"
            exit 1
          fi
          
          # API 문서 접근
          if curl -f --max-time 30 $STAGING_URL/docs; then
            echo "✅ 스테이징 API 문서 접근 성공"
          else
            echo "❌ 스테이징 API 문서 접근 실패"
            exit 1
          fi
        fi
        
        # 프로덕션 테스트
        if [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "🧪 프로덕션 통합 테스트..."
          
          # 헬스체크
          if curl -f --max-time 30 $PRODUCTION_URL/health; then
            echo "✅ 프로덕션 헬스체크 성공"
          else
            echo "❌ 프로덕션 헬스체크 실패"
            exit 1
          fi
          
          # API 문서 접근
          if curl -f --max-time 30 $PRODUCTION_URL/docs; then
            echo "✅ 프로덕션 API 문서 접근 성공"
          else
            echo "❌ 프로덕션 API 문서 접근 실패"
            exit 1
          fi
        fi
        
        echo "✅ 모든 배포 후 검증 완료!"
        
  # ===== 알림 =====
  notify:
    name: 📱 배포 알림
    runs-on: ubuntu-latest
    needs: [deploy-development, deploy-staging, deploy-production, post-deploy-tests]
    if: always()
    
    steps:
    - name: 📱 배포 결과 알림
      run: |
        echo "📊 배포 결과 요약:"
        echo "개발: ${{ needs.deploy-development.result }}"
        echo "스테이징: ${{ needs.deploy-staging.result }}"  
        echo "프로덕션: ${{ needs.deploy-production.result }}"
        echo "검증: ${{ needs.post-deploy-tests.result }}"
        
        # 여기에 Slack, Discord, 이메일 등 알림 로직 추가 가능 