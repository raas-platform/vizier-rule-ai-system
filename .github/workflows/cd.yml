name: 🚀 CD - 자동 배포

on:
  push:
    branches: [ main, develop, feature/* ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'staging'
        type: choice
        options:
        - development
        - staging
        - production

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vizier-rule-ai-system

jobs:
  # ===== Docker 이미지 빌드 =====
  build:
    name: 🐳 Docker 이미지 빌드
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.docker_build.outputs.digest }}
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔑 Container Registry 로그인
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏷️ 메타데이터 추출
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # Git Tag가 있으면 그대로 사용 (예: v2.1.11)
          type=ref,event=tag
          # 브랜치 푸시면 브랜치 이름 사용 (예: develop)
          type=ref,event=branch
          # Main 브랜치면 latest 태그 추가
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🔧 Docker Buildx 설정
      uses: docker/setup-buildx-action@v3
      
    - name: 🐳 이미지 빌드 및 푸시
      id: docker_build
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # 커밋 SHA 및 빌드 시각 주입
        build-args: |
          COMMIT_SHA=${{ github.sha }}
          BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}
        # 캐시 비활성화
        # cache-from: type=gha
        # cache-to: type=gha,mode=max
        no-cache: true
        
    - name: 📝 이미지 정보 출력
      id: image
      run: |
        echo "digest=${{ steps.docker_build.outputs.digest }}" >> $GITHUB_OUTPUT
        echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker_build.outputs.digest }}" >> $GITHUB_OUTPUT
        
  # ===== 개발 환경 배포 =====
  deploy-development:
    name: 💻 개발 환경 배포
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || contains(github.ref, 'feature/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development')
    environment:
      name: development
      url: http://localhost:8888
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 개발 환경 설정
      run: |
        cp env.template .env
        # 개발 환경용 설정 오버라이드
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=development/' .env
        sed -i 's/DEBUG=false/DEBUG=true/' .env
        sed -i 's/PORT=8000/PORT=8888/' .env
        sed -i 's/WORKERS=4/WORKERS=1/' .env
        sed -i 's/LOG_LEVEL=info/LOG_LEVEL=debug/' .env
        
    - name: 🚀 개발 서버 배포
      run: |
        echo "💻 개발 환경 배포 (로컬 Docker)"
        
        # GHCR 로그인 추가
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
        
        # 기존 컨테이너 정리
        docker stop vizierai-dev || true
        docker rm vizierai-dev || true
        
        # 환경변수 설정 (조건부)
        ENV_ARGS=""
        if [ -n "${{ secrets.OPENAI_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY_DEV }}"
        fi
        if [ -n "${{ secrets.ANTHROPIC_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY_DEV }}"
        fi
        if [ -n "${{ secrets.GOOGLE_API_KEY_DEV || '' }}" ]; then
          ENV_ARGS="$ENV_ARGS -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY_DEV }}"
        fi
        
        # 새 컨테이너 실행
        docker run -d --name vizierai-dev \
          -p 8888:8000 \
          --env-file .env \
          $ENV_ARGS \
          ${{ needs.build.outputs.image }}
          
        echo "✅ 개발 환경 배포 완료!"
        
    - name: 🏥 개발 환경 헬스체크
      run: |
        sleep 15
        curl -f http://localhost:8888/health || echo "⚠️ 헬스체크 실패"
        
  # ===== 스테이징 배포 =====
  deploy-staging:
    name: 🧪 스테이징 배포
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: http://vizierai.duckdns.org:8001
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 스테이징 환경 설정
      run: |
        cp env.template .env.staging.tmp
        # 스테이징 환경용 설정 오버라이드
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=staging/' .env.staging.tmp
        sed -i 's/DEBUG=false/DEBUG=true/' .env.staging.tmp
        sed -i 's/PORT=8000/PORT=8001/' .env.staging.tmp
        sed -i 's/WORKERS=4/WORKERS=2/' .env.staging.tmp
        sed -i 's/LOG_LEVEL=info/LOG_LEVEL=debug/' .env.staging.tmp
        # GitHub Secrets에서 환경 변수 추가
        printf '\nOPENAI_API_KEY=%s\n' "${{ secrets.OPENAI_API_KEY_STAGING }}" >> .env.staging.tmp
        printf 'ANTHROPIC_API_KEY=%s\n' "${{ secrets.ANTHROPIC_API_KEY_STAGING }}" >> .env.staging.tmp
        printf 'GOOGLE_API_KEY=%s\n' "${{ secrets.GOOGLE_API_KEY_STAGING }}" >> .env.staging.tmp
        printf 'SECRET_KEY=%s\n' "${{ secrets.SECRET_KEY_STAGING }}" >> .env.staging.tmp
        printf 'ALLOWED_ORIGINS=%s\n' "${{ secrets.ALLOWED_ORIGINS_STAGING || '*' }}" >> .env.staging.tmp
        
    - name: 🔑 SSH 키 설정
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.STAGING_SSH_KEY }}
        known_hosts: ${{ secrets.STAGING_HOST || 'unnecessary' }}

    - name: 🔎 원격 호스트 DNS/연결 확인
      run: |
        set -euxo pipefail
        echo "🌐 호스트 이름 확인"
        getent hosts ${{ secrets.STAGING_HOST }} || true
        echo "📡 핑 테스트 (3회)"
        ping -c 3 -W 3 ${{ secrets.STAGING_HOST }} || true

    - name: 📁 환경 파일 전송 (scp -v)
      run: |
        set -euxo pipefail
        scp -v -o StrictHostKeyChecking=no .env.staging.tmp ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}:/tmp/.env.staging
        
    - name: 🚀 스테이징 서버 배포
      id: deploy
      run: |
        IMAGE_TAG="ghcr.io/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"

        echo "⚙️ Deploying image $IMAGE_TAG (staging)"

        ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
          "IMAGE_TAG=$IMAGE_TAG GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} GITHUB_ACTOR=${{ github.actor }} bash -s" << 'EOF'
          set -e

          CONTAINER_NAME="vizierai-staging"

          echo "🧪 스테이징 배포 시작 (이미지: $IMAGE_TAG)"
           
          # GitHub Container Registry 로그인
          echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
           
          # 기존 컨테이너 정리
          sudo docker stop ${CONTAINER_NAME} || true
          sudo docker rm ${CONTAINER_NAME} || true
           
          # 디스크 공간 확인 및 자동 정리
          USED=$(df / --output=pcent | tail -1 | tr -dc '0-9')
          echo "📊 현재 디스크 사용량: ${USED}%"
          if [ "$USED" -gt 85 ]; then
            echo "⚠️ 디스크 사용량이 85% 이상입니다. Docker 데이터 정리 중..."
            sudo docker system prune -af --volumes || true
          fi

          echo "📦 Pulling image $IMAGE_TAG"
          sudo docker pull $IMAGE_TAG

          echo "🚀 새 컨테이너 실행: ${CONTAINER_NAME}"
          sudo docker run -d --name ${CONTAINER_NAME} \
            -p 8001:8000 \
            --env-file /tmp/.env.staging \
            --restart unless-stopped \
            $IMAGE_TAG
           
          # --- 상태 검증 및 롤백 ---
          echo "⏱️ 새 컨테이너가 안정화될 때까지 15초 대기..."
          sleep 15

          echo "🏥 새 컨테이너 헬스체크..."
          if curl -fsS --max-time 10 http://localhost:8000/health > /dev/null; then
            echo "✅ 새 컨테이너 헬스체크 성공! 배포를 완료합니다."
          else
            echo "❌ 새 컨테이너 헬스체크 실패! 롤백을 시작합니다."
            sudo docker stop ${CONTAINER_NAME} || true
            sudo docker rm ${CONTAINER_NAME} || true
            exit 1
          fi
           
          rm -f /tmp/.env.staging
        EOF
          
    - name: 🏥 스테이징 헬스체크
      run: |
        sleep 30
        for i in {1..10}; do
          if curl -f http://vizierai.duckdns.org:8001/health; then
            echo "✅ 스테이징 헬스체크 성공!"
            break
          else
            echo "🔄 헬스체크 재시도 ($i/10)..."
            sleep 10
          fi
        done
        
  # ===== 프로덕션 배포 =====
  deploy-production:
    name: 🏭 프로덕션 배포
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: http://vizierai.duckdns.org:8000
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 프로덕션 환경 설정
      run: |
        cp env.template .env.production.tmp
        # 프로덕션 설정은 기본값 유지 (이미 production 설정)
        # GitHub Secrets에서 환경 변수 추가
        printf '\nOPENAI_API_KEY=%s\n' "${{ secrets.OPENAI_API_KEY_PROD }}" >> .env.production.tmp
        printf 'ANTHROPIC_API_KEY=%s\n' "${{ secrets.ANTHROPIC_API_KEY_PROD }}" >> .env.production.tmp
        printf 'GOOGLE_API_KEY=%s\n' "${{ secrets.GOOGLE_API_KEY_PROD }}" >> .env.production.tmp
        printf 'SECRET_KEY=%s\n' "${{ secrets.SECRET_KEY_PROD }}" >> .env.production.tmp
        printf 'ALLOWED_ORIGINS=%s\n' "${{ secrets.ALLOWED_ORIGINS_PROD || '*' }}" >> .env.production.tmp
        
    - name: 🛡️ 프로덕션 사전 검사
      run: |
        echo "🔍 프로덕션 배포 사전 검사..."
        # 태그 버전 확인
        if [[ "${{ github.ref }}" =~ refs/tags/v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
          echo "✅ 유효한 버전 태그: ${{ github.ref }}"
        else
          echo "❌ 유효하지 않은 버전 태그"
          exit 1
        fi
        
    - name: 🔑 SSH 키 설정 (프로덕션)
      uses: shimataro/ssh-key-action@v2
      with:
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        known_hosts: unnecessary
        
    - name: 📁 환경 파일 전송
      run: |
        scp -o StrictHostKeyChecking=no .env.production.tmp ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }}:/tmp/.env.production
        
    - name: 🚀 프로덕션 서버 배포
      id: deploy
      run: |
        # GHCR 이미지 digest를 로컬 변수로 설정합니다.
        IMAGE_TAG="ghcr.io/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"

        echo "⚙️ Deploying image $IMAGE_TAG"

        # 원격 쉘에 필요한 변수를 환경변수로 전달하고, EOF 구분자를 인용하여 로컬 변수 치환을 방지합니다.
        ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} \
          "IMAGE_TAG=$IMAGE_TAG GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} GITHUB_ACTOR=${{ github.actor }} bash -s" << 'EOF'
          set -e

          CONTAINER_NAME="vizierai-production"
          BACKUP_CONTAINER_NAME="vizierai-production-backup"

          echo "🏭 프로덕션 배포 시작 (이미지: $IMAGE_TAG)"
          
          # GitHub Container Registry 로그인
          echo "$GITHUB_TOKEN" | sudo docker login ghcr.io -u $GITHUB_ACTOR --password-stdin
          
          # --- 사전 정리: 포트 충돌을 막기 위해 모든 관련 컨테이너를 확실히 정리 ---
          # 1. 이전 백업 컨테이너가 존재하면 중지하고 삭제합니다.
          if sudo docker ps -a --format '{{.Names}}' | grep -q "^${BACKUP_CONTAINER_NAME}$"; then
            echo "🧹 이전 백업 컨테이너(${BACKUP_CONTAINER_NAME})를 정리합니다."
            sudo docker stop ${BACKUP_CONTAINER_NAME} || true
            sudo docker rm ${BACKUP_CONTAINER_NAME}
          fi

          # 2. 현재 운영 컨테이너를 백업으로 전환합니다.
          if sudo docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            echo "📦 현재 운영 컨테이너를 백업으로 전환합니다."
            sudo docker stop ${CONTAINER_NAME}
            sudo docker rename ${CONTAINER_NAME} ${BACKUP_CONTAINER_NAME}
          fi

          # 3. 8000 포트를 점유 중인 컨테이너가 남아 있으면 완전히 제거하여 포트 충돌을 예방합니다.
          echo "🧹 8000 포트를 점유한 컨테이너를 정리합니다."
          for cid in $(sudo docker ps --filter "publish=8000" -q); do
            echo "   ↪ removing container $cid (port 8000)"
            sudo docker rm -f "$cid" || true
          done
          
          # --- 새 버전 배포 전 디스크 공간 확보 ---
          USED=$(df / --output=pcent | tail -1 | tr -dc '0-9')
          echo "📊 현재 디스크 사용량: ${USED}%"
          if [ "$USED" -gt 85 ]; then
            echo "⚠️ 디스크 사용량이 85% 이상입니다. Docker 데이터 정리 중..."
            sudo docker system prune -af --volumes || true
          fi
          
          echo "🚚 최신 이미지 PULL: $IMAGE_TAG"
          sudo docker pull $IMAGE_TAG
          
          echo "🚀 새 컨테이너 실행: ${CONTAINER_NAME}"
          sudo docker run -d --name ${CONTAINER_NAME} \
            -p 8000:8000 \
            --env-file /tmp/.env.production \
            --restart unless-stopped \
            $IMAGE_TAG

          # --- 상태 검증 및 롤백 ---
          echo "⏱️ 새 컨테이너가 안정화될 때까지 15초 대기..."
          sleep 15

          echo "🏥 새 컨테이너 헬스체크..."
          if curl -fsS --max-time 10 http://localhost:8000/health > /dev/null; then
            echo "✅ 새 컨테이너 헬스체크 성공! 배포를 완료합니다."
            if sudo docker ps -a --format '{{.Names}}' | grep -q "^${BACKUP_CONTAINER_NAME}$"; then
                echo "🧹 백업 컨테이너(${BACKUP_CONTAINER_NAME})를 삭제합니다."
                sudo docker stop ${BACKUP_CONTAINER_NAME} || true
                sudo docker rm ${BACKUP_CONTAINER_NAME}
            fi
          else
            echo "❌ 새 컨테이너 헬스체크 실패! 롤백을 시작합니다."
            echo "==== [Debug] 실패한 컨테이너 로그 ===="
            sudo docker logs --tail 100 ${CONTAINER_NAME}
            echo "===================================="
            
            sudo docker stop ${CONTAINER_NAME} && sudo docker rm ${CONTAINER_NAME}
            
            if sudo docker ps -a --format '{{.Names}}' | grep -q "^${BACKUP_CONTAINER_NAME}$"; then
                echo "⏪ 백업 컨테이너를 다시 활성화합니다."
                sudo docker rename ${BACKUP_CONTAINER_NAME} ${CONTAINER_NAME}
                sudo docker start ${CONTAINER_NAME}
            fi
            exit 1 # 스크립트를 실패 처리
          fi
          
          # 임시 환경변수 파일 정리
          rm -f /tmp/.env.production
        EOF
          
    - name: 🔍 프로덕션 검증
      if: steps.deploy.outcome == 'success'
      run: |
        sleep 60
        echo "🔍 프로덕션 서비스 검증 중..."
        
        # 헬스체크
        curl -f http://${{ secrets.PRODUCTION_HOST }}:8000/health
        
        # API 문서 확인
        curl -f http://${{ secrets.PRODUCTION_HOST }}:8000/docs
        
        echo "✅ 프로덕션 검증 완료!"
        
    - name: 📈 배포 메트릭 수집
      run: |
        echo "📊 배포 메트릭 기록..."
        echo "배포 완료: $(date)" 
        echo "버전: ${{ github.ref }}"
        echo "커밋: ${{ github.sha }}"
        echo "이미지: ${{ needs.build.outputs.image }}"
          
  # ===== 배포 후 검증 =====
  post-deploy-tests:
    name: 🧪 배포 후 검증
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: 🧪 배포된 서비스 통합 테스트
      env:
        STAGING_URL: http://vizierai.duckdns.org:8001
        PRODUCTION_URL: http://vizierai.duckdns.org:8000
      run: |
        # 스테이징 테스트
        if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
          echo "🧪 스테이징 통합 테스트..."
          
          # 헬스체크
          if curl -f --max-time 30 $STAGING_URL/health; then
            echo "✅ 스테이징 헬스체크 성공"
          else
            echo "❌ 스테이징 헬스체크 실패"
            exit 1
          fi
          
          # API 문서 접근
          if curl -f --max-time 30 $STAGING_URL/docs; then
            echo "✅ 스테이징 API 문서 접근 성공"
          else
            echo "❌ 스테이징 API 문서 접근 실패"
            exit 1
          fi
        fi
        
        # 프로덕션 테스트
        if [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "🧪 프로덕션 통합 테스트..."
          
          # 헬스체크
          if curl -f --max-time 30 $PRODUCTION_URL/health; then
            echo "✅ 프로덕션 헬스체크 성공"
          else
            echo "❌ 프로덕션 헬스체크 실패"
            exit 1
          fi
          
          # API 문서 접근
          if curl -f --max-time 30 $PRODUCTION_URL/docs; then
            echo "✅ 프로덕션 API 문서 접근 성공"
          else
            echo "❌ 프로덕션 API 문서 접근 실패"
            exit 1
          fi
        fi
        
        echo "✅ 모든 배포 후 검증 완료!"
        
