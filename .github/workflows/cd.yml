name: 🚀 CD - 자동 배포

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
        
  # ===== 스테이징 배포 =====
  deploy-staging:
    name: 🧪 스테이징 배포
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: http://54.180.109.51:8000
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 스테이징 환경 설정
      run: |
        cp env.template .env
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=staging/' .env
        sed -i 's/DEBUG=false/DEBUG=true/' .env
        sed -i 's/LOG_LEVEL=info/LOG_LEVEL=debug/' .env
        
    - name: 🚀 스테이징 서버 배포
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /opt/vizierai
          # 최신 코드 업데이트를 위한 임시 방법
          rm -rf /tmp/vizierai-latest
          git clone https://github.com/yeonjae-work/vizier-rule-ai-system.git /tmp/vizierai-latest
          cd /tmp/vizierai-latest
          git checkout develop
          
          # 기존 서비스 중지
          cd /opt/vizierai
          docker-compose down || true
          
          # 새 코드 복사
          cp -r /tmp/vizierai-latest/* /opt/vizierai/
          cp /tmp/vizierai-latest/.env.template /opt/vizierai/.env
          
          # 서비스 시작
          docker-compose up -d --build
          
          # 정리
          rm -rf /tmp/vizierai-latest
          
    - name: 🏥 스테이징 헬스체크
      run: |
        sleep 30
        curl -f ${{ vars.STAGING_URL }}/health
        
  # ===== 프로덕션 배포 =====
  deploy-production:
    name: 🏭 프로덕션 배포
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: http://54.180.109.51:8000
      
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 프로덕션 환경 설정
      run: |
        cp env.template .env
        # 프로덕션 설정은 시크릿에서 가져옴
        
    - name: 🛡️ 프로덕션 사전 검사
      run: |
        # 프로덕션 배포 전 안전 검사
        ./production-check.sh
        
    - name: 🚀 프로덕션 서버 배포 (Blue-Green)
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USER }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /opt/vizierai
          
          # Blue-Green 배포 스크립트 실행
          ./deploy-production.sh production
          
          # 헬스체크
          curl -f http://localhost:8000/health
          
          # 트래픽 전환
          sudo systemctl reload nginx
          
    - name: 🔍 프로덕션 검증 테스트
      run: |
        sleep 60
        curl -f ${{ vars.PRODUCTION_URL }}/health
        curl -f ${{ vars.PRODUCTION_URL }}/docs
        
    - name: 📈 배포 메트릭 수집
      run: |
        # 배포 메트릭을 모니터링 시스템에 전송
        echo "배포 완료: $(date)" >> deployment.log
          
  # ===== 배포 후 검증 =====
  post-deploy-tests:
    name: 🧪 배포 후 검증
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🧪 백엔드 테스트 실행
      run: |
        cd backend
        pip install -r requirements.txt
        python -m pytest tests/ -v
        
    - name: 🔍 통합 테스트 실행
      run: |
        pip install pytest requests
        python -m pytest test_api_call.py test_user_json.py test_analyzer.py -v 