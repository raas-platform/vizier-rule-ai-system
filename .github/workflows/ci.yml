name: 🔍 CI - 코드 품질 & 테스트

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "18"

jobs:
  # ===== 코드 품질 검사 =====
  code-quality:
    name: 📋 코드 품질 검사
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 의존성 캐시
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        
    - name: 📥 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black isort mypy pytest-cov
        
    - name: 🎨 코드 포맷팅 검사 (Black)
      run: |
        black --check --diff backend/
        
    - name: 🔧 Import 정렬 검사 (isort)
      run: |
        isort --check-only --diff backend/
        
    - name: 🔍 린트 검사 (Flake8)
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
        
    - name: 🏷️ 타입 검사 (MyPy)
      run: |
        mypy backend/app --ignore-missing-imports
        
  # ===== 보안 검사 =====
  security:
    name: 🔒 보안 검사
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 🔐 보안 취약점 검사 (Bandit)
      run: |
        pip install bandit
        bandit -r backend/ -f json -o bandit-report.json || true
        
    - name: 📊 보안 리포트 업로드
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: bandit-report.json
        
    - name: 🔍 의존성 취약점 검사 (Safety)
      run: |
        pip install safety
        safety check -r requirements.txt --json > safety-report.json || true
        
  # ===== 단위 테스트 =====
  unit-tests:
    name: 🧪 단위 테스트
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
        
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python ${{ matrix.python-version }} 설정
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: 📦 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
        
    - name: 🧪 테스트 실행
      env:
        ENVIRONMENT: test
        SECRET_KEY: test-secret-key-for-ci
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}
      run: |
        cd backend
        pytest -v --cov=app --cov-report=xml --cov-report=html
        
    - name: 📊 커버리지 리포트 업로드
      uses: codecov/codecov-action@v3
      with:
        file: backend/coverage.xml
        flags: unittests
        
  # ===== 통합 테스트 =====
  integration-tests:
    name: 🔗 통합 테스트
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
          
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🐍 Python 설정
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: 📦 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 🔧 테스트 환경 설정
      run: |
        cp env.template .env
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=test/' .env
        sed -i 's/DEBUG=false/DEBUG=true/' .env
        
    - name: 🚀 애플리케이션 시작
      run: |
        cd backend
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10
      env:
        ENVIRONMENT: test
        SECRET_KEY: test-secret-key-for-ci
        
    - name: 🔗 API 통합 테스트
      run: |
        python backend/test_api.py
        
    - name: 🏥 헬스체크 테스트
      run: |
        curl -f http://localhost:8000/health
        curl -f http://localhost:8000/docs
        
  # ===== Docker 빌드 테스트 =====
  docker-build:
    name: 🐳 Docker 빌드 테스트
    runs-on: ubuntu-latest
    
    steps:
    - name: 📂 코드 체크아웃
      uses: actions/checkout@v4
      
    - name: 🔧 Docker Buildx 설정
      uses: docker/setup-buildx-action@v3
      
    - name: 🐳 Docker 이미지 빌드
      run: |
        docker-compose build --no-cache
        
    - name: 🧪 Docker 컨테이너 테스트
      run: |
        cp env.template .env
        sed -i 's/ENVIRONMENT=production/ENVIRONMENT=test/' .env
        docker-compose up -d
        sleep 30
        curl -f http://localhost:8000/health
        docker-compose down 