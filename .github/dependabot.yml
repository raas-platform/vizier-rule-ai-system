version: 2
updates:
  # Python 의존성 업데이트
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    commit-message:
      prefix: "📦"
      include: "scope"
    reviewers:
      - "yeonjae-work"
    assignees:
      - "yeonjae-work"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    
  # Docker 이미지 업데이트
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "02:00"
    commit-message:
      prefix: "🐳"
      include: "scope"
    reviewers:
      - "yeonjae-work"
    labels:
      - "dependencies"
      - "docker"
    open-pull-requests-limit: 3
    
  # GitHub Actions 업데이트
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "🔧"
      include: "scope"
    reviewers:
      - "yeonjae-work"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 2 