version: '3.8'

services:
  # VizierAI Rule Validation API
  vizierai-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vizierai-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://yourdomain.com}
      - WORKERS=${WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./backend/test.db:/app/test.db:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - vizierai-network

  # Nginx 리버스 프록시 (선택사항)
  nginx:
    image: nginx:alpine
    container_name: vizierai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      vizierai-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vizierai-network
    profiles:
      - with-nginx

  # Redis 캐시 (선택사항)
  redis:
    image: redis:7-alpine
    container_name: vizierai-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-defaultpassword}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - vizierai-network
    profiles:
      - with-cache

networks:
  vizierai-network:
    driver: bridge

volumes:
  redis-data:
    driver: local 