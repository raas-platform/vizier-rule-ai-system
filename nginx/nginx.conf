# VizierAI Nginx Reverse Proxy
# 위치: ./nginx/nginx.conf (docker-compose.yml 에서 마운트)

# HTTP 서버 ---------------------------------------------------------------
server {
    listen 80;
    server_name vizierai.duckdns.org;

    # Let's Encrypt HTTP-01 챌린지를 위해 /.well-known 접두어는 로컬로 제공
    location ^~ /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # 모든 나머지 요청은 FastAPI 컨테이너로 프록시
    location / {
        proxy_pass http://vizierai-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}

